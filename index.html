<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הזמנה - המטבח של גלעד</title>
    <meta property="og:title" content="המטבח של גלעד - הזמנה דיגיטלית">
    <meta property="og:description" content="חמוצים בטעם של פעם, תבשילים ומרקים ביתיים. הזמינו עכשיו בקליק!">
    <meta property="og:image" content="https://giladmagor.github.io/gilad-kitchen/לוגו המטבח של גלעד.jpg">
    
    <style>
        :root { 
            --primary-green: #2d5a27; 
            --accent-color: #e0d7c6; 
            --bg-color: #fdfbf7; 
        }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); padding: 20px; text-align: right; color: #333; margin: 0; }
        
        .container { max-width: 550px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin: auto; border: 1px solid var(--accent-color); position: relative; }
        
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo { max-width: 180px; height: auto; border-radius: 10px; }
        
        h2 { color: var(--primary-green); text-align: center; margin-top: 0; }
        
        label { font-weight: bold; display: block; margin-bottom: 5px; margin-top: 12px; color: var(--primary-green); }
        
        .name-row { display: flex; gap: 15px; margin-top: 15px; }
        .name-row div { flex: 1; }

        input[type="text"], input[type="tel"] { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; 
            box-sizing: border-box; font-size: 16px; font-family: inherit; 
        }

        /* רשימת מוצרים עם כפתורי פלוס מינוס */
        .product-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; padding: 10px 0; }
        .product-name { flex: 1; font-size: 0.95em; padding-left: 10px; }
        .qty-controls { display: flex; align-items: center; gap: 8px; background: #f8f8f8; border-radius: 10px; padding: 4px; }
        .qty-btn { background: var(--primary-green); color: white; border: none; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; }
        .prod-qty { width: 35px; text-align: center; border: none; background: transparent; font-size: 16px; font-weight: bold; pointer-events: none; }

        .summary { background: #f1f8f1; padding: 15px; border-radius: 12px; margin-top: 20px; font-size: 1.3em; text-align: center; border: 2px dashed var(--primary-green); }
        #totalPrice { color: var(--primary-green); font-weight: bold; }

        /* כרטיסי בחירה לחיצים */
        .radio-group { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .radio-option { display: flex; align-items: center; padding: 12px; border: 2px solid #eee; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .radio-option input[type="radio"] { margin-left: 10px; width: 16px; height: 16px; cursor: pointer; }
        .radio-option:has(input:checked) { border-color: var(--primary-green); background: #f1f8f1; }
        
        /* כפתור העתקת מספר */
        .copy-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .btn-copy { padding: 5px 10px; background: #eee; color: #333; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; font-size: 14px; }

        /* כפתור שליחה ירוק מקורי */
        button#submitBtn { background: var(--primary-green); color: white; border: none; padding: 16px; width: 100%; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 25px; transition: 0.3s; }
        button#submitBtn:hover { background: #1e3d1a; }
        button#submitBtn:disabled { background: #ccc; cursor: not-allowed; }

        #thankYouScreen { display: none; text-align: center; padding: 40px 20px; animation: fadeIn 0.5s ease-in-out; }
        .success-icon { font-size: 50px; color: var(--primary-green); margin-bottom: 15px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 480px) { .name-row { flex-direction: column; gap: 0; } }
    </style>
</head>
