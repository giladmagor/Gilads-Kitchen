<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>הזמנה - המטבח של גלעד</title>
    
    <style>
        :root { 
            --primary-green: #2d5a27; 
            --bg-color: #f5f5f0;
            --plus-green: #7ed9a2;
            --new-tag: #ff5722; 
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-color); 
            padding: 15px; 
            text-align: right; 
            color: #333; 
            margin: 0; 
            padding-bottom: 140px; 
        }
        
        .container { max-width: 500px; margin: auto; }
        .logo-container { text-align: center; margin-bottom: 15px; }
        .logo { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        h2 { color: var(--primary-green); text-align: center; margin-bottom: 5px; }
        .instagram-link { display: block; text-align: center; color: #8c7b60; text-decoration: none; font-size: 0.9rem; margin-bottom: 20px; font-weight: 600; }

        /* TABS */
        .tabs-container { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding: 5px; }
        .tab-btn { 
            background: white; border: 2px solid #eee; padding: 10px 20px; border-radius: 25px; 
            cursor: pointer; white-space: nowrap; font-weight: bold; color: #666; transition: 0.3s;
        }
        .tab-btn.active { background: var(--primary-green); color: white; border-color: var(--primary-green); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block !important; }

        /* PRODUCT CARDS */
        .product-card { 
            background: #ffffff; border-radius: 20px; padding: 18px; margin-bottom: 15px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.04); border: 1px solid #eee; 
            display: flex; justify-content: space-between; align-items: center; position: relative;
        }

        .badge-new {
            position: absolute; top: -10px; right: 15px; background: var(--new-tag);
            color: white; padding: 3px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; z-index: 5;
        }

        .product-info { flex: 1; }
        .product-name { margin: 0; font-size: 1.1rem; color: var(--primary-green); font-weight: 800; }
        .product-description { margin: 4px 0; font-size: 0.85rem; color: #7f8c8d; }
        .product-price { font-weight: bold; color: #27ae60; }

        .quantity-controls { display: flex; align-items: center; gap: 10px; background: #f0f0f0; padding: 6px; border-radius: 30px; }
        .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        .qty-btn.plus { background: var(--plus-green); color: white; }
        .prod-qty { width: 30px; text-align: center; border: none; background: transparent; font-size: 16px; font-weight: bold; }

        /* FORM */
        .form-section { background: white; padding: 20px; border-radius: 20px; margin-top: 25px; border: 1px solid #eee; }
        input[type="text"], input[type="tel"] { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; margin: 8px 0; }
        
        .floating-footer { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 400px; background: var(--primary-green); 
            color: white; padding: 18px; border-radius: 40px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1000; font-size: 1.1rem; font-weight: bold;
        }

        #submitBtn { background: var(--primary-green); color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; cursor: pointer; font-size: 1.1rem; font-weight: bold; margin-top: 20px; }
        .copy-box { display: flex; justify-content: space-between; align-items: center; background: #f0f4f0; padding: 10px; border-radius: 10px; margin: 10px 0; }
        .copy-btn { background: var(--primary-green); color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container"><img src="לוגו המטבח של גלעד.jpg" alt="המטבח של גלעד" class="logo"></div>
    <h2>המטבח של גלעד</h2>
    <a href="https://www.instagram.com/gilads.kitchen" target="_blank" class="instagram-link">עקבו אחרינו באינסטגרם</a>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="openTab(event, 'pickles')">חמוצים</button>
        <button class="tab-btn" onclick="openTab(event, 'soups')">מרקים</button>
        <button class="tab-btn" onclick="openTab(event, 'pastries')">מאפים ותוספות</button>
    </div>

    <div id="pickles" class="tab-content active">
        <div class="product-card">
            <div class="badge-new">חדש</div>
            <div class="product-info"><h3 class="product-name">עגבניות שרי מוחמצות</h3><p class="product-description">580 מ"ל - טעם מפתיע!</
