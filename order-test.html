<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת הזמנות - גרסת ניסויי</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --bg-color: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: #333;
        }
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .test-badge {
            background: #d9534f;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            display: inline-block;
            margin-bottom: 10px;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .product-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .product-card img {
            max-width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 4px;
        }
        .price-tag {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.2em;
            margin: 10px 0;
        }
        .quantity-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        input[type="number"] {
            width: 50px;
            text-align: center;
            padding: 5px;
        }
        .delivery-section {
            margin-top: 30px;
            padding: 20px;
            background: #f1f1f1;
            border-radius: 8px;
        }
        .payment-box {
            border: 2px dashed #27ae60;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
            background: #f9fffb;
        }
        .submit-btn {
            background-color: #25d366;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .submit-btn:hover {
            background-color: #128c7e;
        }
        .out-of-stock {
            opacity: 0.6;
            filter: grayscale(1);
            position: relative;
        }
        .stock-label {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <div class="test-badge">(גרסת ניסויי)</div>
    <h1>המזווה שלכם - הזמנה ישירה</h1>
</header>

<div class="container">
    <div id="product-list" class="product-grid">
        <div class="product-card">
            <h3>כרוב כבוש ביתי</h3>
            <p>חמוצים מסורתיים בתסיסה טבעית</p>
            <div class="price-tag">35 ₪</div>
            <div class="quantity-controls">
                <input type="number" min="0" value="0" data-name="כרוב כבוש" data-price="35">
            </div>
        </div>

        <div class="product-card">
            <h3>מלפפון חמוץ במלח</h3>
            <p>פריכים וטעימים כמו פעם</p>
            <div class="price-tag">30 ₪</div>
            <div class="quantity-controls">
                <input type="number" min="0" value="0" data-name="מלפפון חמוץ" data-price="30">
            </div>
        </div>

        <div class="product-card">
            <h3>ממרח פיקלס (המבורגר)</h3>
            <p>המרכיב הסודי להמבורגר המושלם</p>
            <div class="price-tag">25 ₪</div>
            <div class="quantity-controls">
                <input type="number" min="0" value="0" data-name="ממרח פיקלס" data-price="25">
            </div>
        </div>
    </div>

    <hr>

    <div class="delivery-section">
        <h3>פרטי משלוח וקבלת הזמנה</h3>
        
        <label for="userName">שם מלא:</label>
        <input type="text" id="userName" style="width:100%; margin-bottom:15px; padding:8px;" placeholder="הכנס שם מלא">

        <label for="deliveryMethod">אופן קבלת ההזמנה:</label>
        <select id="deliveryMethod" style="width:100%; padding:10px; font-size:1em;">
            <option value="monday_shirley">ביום שני עם החלוקה של שירלי</option>
        </select>
    </div>

    <div class="payment-box">
        <p>ניתן לשלם ב-Bit / Paybox למספר:</p>
        <h2 style="margin:5px 0; color:#27ae60;">0503618748</h2>
    </div>

    <button onclick="sendOrder()" class="submit-btn">
        <span>שלח הזמנה בוואטסאפ</span>
    </button>
</div>

<script>
    function sendOrder() {
        const name = document.getElementById('userName').value;
        if (!name) {
            alert("אנא הכנס שם מלא");
            return;
        }

        let orderDetails = "הזמנה חדשה (גרסת ניסויי):\n";
        orderDetails += `שם הלקוח: ${name}\n`;
        orderDetails += `אופן קבלה: ביום שני עם החלוקה של שירלי\n\n`;
        
        let total = 0;
        const inputs = document.querySelectorAll('input[type="number"]');
        let hasItems = false;

        inputs.forEach(input => {
            const quantity = parseInt(input.value);
            if (quantity > 0) {
                const price = parseFloat(input.getAttribute('data-price'));
                const productName = input.getAttribute('data-name');
                orderDetails += `- ${productName}: ${quantity} יחידות (${quantity * price} ₪)\n`;
                total += quantity * price;
                hasItems = true;
            }
        });

        if (!hasItems) {
            alert("אנא בחר לפחות מוצר אחד");
            return;
        }

        orderDetails += `\nסה"כ לתשלום: ${total} ₪`;
        
        const phoneNumber = "972503618748";
        const encodedMsg = encodeURIComponent(orderDetails);
        window.open(`https://wa.me/${phoneNumber}?text=${encodedMsg}`, '_blank');
    }
</script>

</body>
</html>
