<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>הזמנה - המטבח של גלעד</title>
    
    <style>
        :root { 
            --earthy-green: #4a5d4e; /* ירוק מרווה עמוק */
            --soft-sage: #8da390;    /* ירוק בהיר טבעי */
            --cream-bg: #f9f7f2;    /* רקע נייר קרם */
            --warm-brown: #8c7b60;   /* חום אדמתי לטקסט משני */
            --accent-orange: #d98c5f; /* כתום חמר למוצרים חדשים */
            --card-white: rgba(255, 255, 255, 0.8);
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: var(--cream-bg); 
            background-image: radial-gradient(#e5e0d8 1px, transparent 1px); /* טקסטורה עדינה מאוד */
            background-size: 20px 20px;
            padding: 15px; 
            color: #333;
            margin: 0; 
            padding-bottom: 140px; 
        }
        
        .container { max-width: 500px; margin: auto; }
        .logo-container { text-align: center; margin-top: 20px; margin-bottom: 10px; }
        .logo { width: 110px; height: 110px; object-fit: cover; border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; /* צורה אורגנית */ box-shadow: 0 10px 20px rgba(74, 93, 78, 0.15); border: 3px solid white; }
        
        h2 { color: var(--earthy-green); text-align: center; font-weight: 700; font-size: 1.8rem; margin-bottom: 5px; }
        .instagram-link { display: block; text-align: center; color: var(--warm-brown); text-decoration: none; font-size: 0.9rem; margin-bottom: 25px; font-weight: 500; letter-spacing: 0.5px; }

        /* --- טאבים אורגניים --- */
        .tabs-container { display: flex; gap: 12px; margin-bottom: 25px; overflow-x: auto; padding: 5px; scrollbar-width: none; }
        .tab-btn { 
            background: white; border: 1px solid #e0ddd5; padding: 12px 22px; 
            border-radius: 15px 25px 15px 25px; /* צורה לא סימטרית */
            cursor: pointer; white-space: nowrap; font-weight: 600; color: var(--warm-brown); 
            transition: all 0.4s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .tab-btn.active { 
            background: var(--earthy-green); color: #fdfcf9; border-color: var(--earthy-green); 
            box-shadow: 0 6px 15px rgba(74, 93, 78, 0.2); transform: translateY(-2px);
        }
        
        .tab-content { display: none; }
        #pickles { display: block; }

        /* --- כרטיס מוצר Earthy --- */
        .product-card { 
            background: var(--card-white); border-radius: 24px; padding: 20px; margin-bottom: 15px; 
            box-shadow: 0 8px 24px rgba(141, 163, 144, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            display: flex; flex-direction: column; position: relative;
            backdrop-filter: blur(5px);
        }
        
        .product-main-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }

        .badge-new {
            position: absolute; top: -10px; right: 15px; background: var(--accent-orange);
            color: white; padding: 4px 14px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
        }

        .product-info { flex: 1; padding-left: 10px; }
        .product-name { margin: 0; font-size: 1.15rem; color: var(--earthy-green); font-weight: 700; }
        .product-description { margin: 5px 0; font-size: 0.85rem; color: var(--warm-brown); line-height: 1.4; }
        .product-price { font-weight: 800; color: var(--soft-sage); display: block; margin-top: 6px; font-size: 1rem; }

        /* --- פקדי כמות Soft --- */
        .quantity-controls { display: flex; align-items: center; gap: 10px; background: #f0ede6; padding: 6px; border-radius: 30px; }
        .qty-btn { 
            width: 34px; height: 34px; border-radius: 50%; border: none; 
            background: white; color: var(--earthy-green); font-size: 20px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s;
        }
        .qty-btn.plus { background: var(--soft-sage); color: white; }
        .qty-btn:active { transform: scale(0.9); }
        .prod-qty { width: 30px; text-align: center; border: none; background: transparent; font-size: 1.1rem; font-weight: 700; color: var(--earthy-green); }

        .comment-toggle-btn { background: none; border: none; color: var(--warm-brown); font-size: 0.8rem; cursor: pointer; margin-top: 8px; text-decoration: underline; font-weight: 600; opacity: 0.8; }
        .product-comment-input { width: 100%; padding: 12px; margin-top: 12px; border: 1px solid #e0ddd5; border-radius: 12px; font-size: 0.9rem; background: rgba(255,255,255,0.5); display: none; outline: none; transition: border 0.3s; }
        .product-comment-input:focus { border-color: var(--soft-sage); }

        /* --- טופס ופרטים --- */
        .form-section { background: white; padding: 25px; border-radius: 30px; margin-top: 30px; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        label { display: block; margin-top: 20px; font-weight: 700; color: var(--earthy-green); font-size: 0.95rem; }
        input[type="text"], input[type="tel"], textarea { width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 15px; box-sizing: border-box; font-size: 16px; margin: 10px 0; background: #fdfcfb; transition: 0.3s; }
        input:focus { border-color: var(--soft-sage); outline: none; background: white; }
        
        .phone-display { font-size: 0.95rem; background: #f4f6f4; padding: 6px 12px; border-radius: 12px; color: var(--earthy-green); font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .copy-btn { background: var(--soft-sage); color: white; border: none; border-radius: 8px; padding: 4px 10px; font-size: 0.8rem; cursor: pointer; }

        .radio-card { display: flex; align-items: center; padding: 15px; background: #fdfcfb; border: 1.5px solid #eee; border-radius: 18px; cursor: pointer; margin-bottom: 10px; transition: 0.3s; }
        .radio-card:has(input:checked) { border-color: var(--soft-sage); background: #f7f9f7; }
        .radio-card input { margin-left: 12px; accent-color: var(--earthy-green); }

        .floating-footer { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 88%; max-width: 420px; background: var(--earthy-green); 
            color: #f9f7f2; padding: 18px; border-radius: 20px 40px 20px 40px; 
            text-align: center; box-shadow: 0 12px 30px rgba(74, 93, 78, 0.4); z-index: 1000; font-size: 1.2rem; font-weight: 700;
        }

        #submitBtn { 
            background: var(--earthy-green); color: white; border: none; padding: 20px; 
            width: 100%; border-radius: 18px; cursor: pointer; font-size: 1.3rem; 
            font-weight: 700; margin-top: 25px; transition: 0.4s; 
            box-shadow: 0 8px 20px rgba(74, 93, 78, 0.2);
        }
        #submitBtn:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(74, 93, 78, 0.3); }
        #submitBtn:disabled { background: #b0b0b0; transform: none; box-shadow: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container"><img src="לוגו המטבח של גלעד.jpg" alt="לוגו" class="logo"></div>
    <h2>המטבח של גלעד</h2>
    <a href="https://www.instagram.com/gilads.kitchen" target="_blank" class="instagram-link">גיאומטריה של טעמים טבעיים</a>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="openTab(event, 'pickles')">מרתף החמוצים</button>
        <button class="tab-btn" onclick="openTab(event, 'soups')">מרקים חמים</button>
        <button class="tab-btn" onclick="openTab(event, 'pastries')">מהתנור שלנו</button>
    </div>

    <div id="pickles" class="tab-content">
        <div class="product-card">
            <div class="badge-new">מהגינה</div>
            <div class="product-main-row">
                <div class="product-info">
                    <h3 class="product-name">עגבניות שרי מוחמצות</h3>
                    <p class="product-description">חמוץ מתוק בטעם חלומי - 580 מ"ל</p>
                    <button class="comment-toggle-btn" onclick="toggleComment(this)">הוסף בקשה מיוחדת</button>
                    <span class="product-price">₪25</span>
                </div>
                <div class="quantity-controls">
                    <button class="qty-btn" onclick="changeQty(this, -1)">-</button>
                    <input type="number" class="prod-qty" data-price="25" data-name="עגבניות שרי מוחמצות" value="0" readonly>
                    <button class="qty-btn plus" onclick="changeQty(this, 1)">+</button>
                </div>
            </div>
            <input type="text" class="product-comment-input" placeholder="למשל: 'הרבה שום', 'בלי חריף'...">
        </div>
        <div class="product-card">
            <div class="product-main-row">
                <div class="product-info">
                    <h3 class="product-name">מלפפון חמוץ</h3>
                    <p class="product-description">בטעם של פעם - 580 מ"ל</p>
                    <button class="comment-toggle-btn" onclick="toggleComment(this)">הוסף הערה</button>
                    <span class="product-price">₪28</span>
                </div>
                <div class="quantity-controls">
                    <button class="qty-btn" onclick="changeQty(this, -1)">-</button>
                    <input type="number" class="prod-qty" data-price="28" data-name="מלפפון חמוץ" value="0" readonly>
                    <button class="qty-btn plus" onclick="changeQty(this, 1)">+</button>
                </div>
            </div>
            <input type="text" class="product-comment-input" placeholder="הערות למלפפונים...">
        </div>
    </div>

    <div id="soups" class="tab-content">
        <div class="product-card">
            <div class="product-main-row">
                <div class="product-info">
                    <h3 class="product-name">מרק ירקות עשיר</h3>
                    <p class="product-description">חצי ליטר של בריאות</p>
                    <button class="comment-toggle-btn" onclick="toggleComment(this)">הוסף הערה</button>
                    <span class="product-price">₪35</span>
                </div>
                <div class="quantity-controls">
                    <button class="qty-btn" onclick="changeQty(this, -1)">-</button>
                    <input type="number" class="prod-qty" data-price="35" data-name="מרק ירקות" value="0" readonly>
                    <button class="qty-btn plus" onclick="changeQty(this, 1)">+</button>
                </div>
            </div>
            <input type="text" class="product-comment-input" placeholder="הערות למרק...">
        </div>
    </div>

    <div class="form-section">
        <label>מי אתם? *</label>
        <div style="display:flex; gap:10px;">
            <input type="text" id="firstName" placeholder="שם פרטי *" required>
            <input type="text" id="lastName" placeholder="שם משפחה *" required>
        </div>
        <input type="tel" id="phone" placeholder="מספר נייד ליצירת קשר *" required maxlength="12" oninput="formatPhone(this)">

        <label>איך תרצו לקבל?</label>
        <div class="radio-group">
            <label class="radio-card"><input type="radio" name="deliveryMethod" value="חלוקה של שירלי" checked onclick="toggleDetail(false)"> <span>יום רביעי - עם החלוקה של שירלי</span></label>
            <label class="radio-card"><input type="radio" name="deliveryMethod" value="בתיאום אישי" onclick="toggleDetail(true)"> <span>בתיאום אישי / איסוף עצמי</span></label>
        </div>
        <textarea id="deliveryNotes" placeholder="פרטים נוספים לתיאום ההזמנה..." style="display:none;"></textarea>

        <div class="payment-label-row">
            <label style="margin-top:0;">תשלום בביט/פייבוקס:</label>
            <div class="phone-display">
                <span>055-2421009</span>
                <button class="copy-btn" onclick="copyNumber()">העתק</button>
            </div>
        </div>
        
        <div class="radio-group">
            <label class="radio-card"><input type="radio" name="payMethod" value="ביט" checked> <span>Bit</span></label>
            <label class="radio-card"><input type="radio" name="payMethod" value="פייבוקס"> <span>PayBox</span></label>
            <label class="radio-card"><input type="radio" name="payMethod" value="מזומן"> <span>מזומן</span></label>
        </div>

        <button id="submitBtn" onclick="sendOrder()">שלח הזמנה מהמטבח</button>
    </div>
</div>

<div class="floating-footer">סה"כ הזמנה: <span id="totalPrice">0</span> ₪</div>

<script>
    // הפונקציות נשמרות מהקוד הקודם שלך כדי לשמור על תקינות השליחה לגוגל שיטס
    function openTab(evt, tabName) {
        var i, tabContent, tabBtns;
        tabContent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabContent.length; i++) { tabContent[i].style.display = "none"; }
        tabBtns = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tabBtns.length; i++) { tabBtns[i].className = tabBtns[i].className.replace(" active", ""); }
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }

    function toggleDetail(show) {
        document.getElementById('deliveryNotes').style.display = show ? 'block' : 'none';
    }
    
    function toggleComment(btn) {
        const card = btn.closest('.product-card');
        const input = card.querySelector('.product-comment-input');
        if (input.style.display === 'block') {
            input.style.display = 'none';
            btn.innerText = 'הוסף בקשה מיוחדת';
            input.value = '';
        } else {
            input.style.display = 'block';
            input.focus();
            btn.innerText = 'בטל בקשה';
        }
    }

    function changeQty(btn, delta) {
        const input = btn.parentElement.querySelector('.prod-qty');
        let val = parseInt(input.value) + delta;
        if (val < 0) val = 0;
        input.value = val;
        updateTotal();
    }

    function updateTotal() {
        let total = 0;
        document.querySelectorAll('.prod-qty').forEach(input => {
            total += (parseInt(input.value) || 0) * parseInt(input.dataset.price);
        });
        document.getElementById('totalPrice').innerText = total;
    }

    function formatPhone(input) {
        let value = input.value.replace(/\D/g, ''); 
        if (value.length > 3) { value = value.slice(0, 3) + '-' + value.slice(3, 10); }
        input.value = value;
    }

    function copyNumber() {
        navigator.clipboard.writeText('0552421009').then(() => {
            alert('המספר הועתק!');
        });
    }

    function sendOrder() {
        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const total = document.getElementById('totalPrice').innerText;
        const btn = document.getElementById('submitBtn');

        if (!firstName || !lastName || phone.length < 11) {
            alert("נא למלא פרטי קשר תקינים.");
            return;
        }
        if (total === "0") {
            alert("הסל ריק... כדאי לטעום משהו!");
            return;
        }

        let orderItems = [];
        document.querySelectorAll('.product-card').forEach(card => {
            const qtyInput = card.querySelector('.prod-qty');
            if (qtyInput) {
                let val = parseInt(qtyInput.value) || 0;
                if (val > 0) {
                    const prodName = qtyInput.getAttribute('data-name');
                    const comment = card.querySelector('.product-comment-input').value.trim();
                    orderItems.push(comment ? `${prodName} (${val}) [${comment}]` : `${prodName} (${val})`);
                }
            }
        });

        const data = {
            date: new Date().toLocaleString('he-IL'),
            name: firstName + " " + lastName,
            phone: phone,
            orderSummary: orderItems.join(", "),
            totalPrice: total,
            paymentMethod: document.querySelector('input[name="payMethod"]:checked').value,
            deliveryMethod: document.querySelector('input[name="deliveryMethod"]:checked').value,
            comments: document.getElementById('deliveryNotes').value.trim()
        };

        btn.disabled = true;
        btn.innerText = "שולח הזמנה...";

        // ה-URL של הגוגל שיטס שלך
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyTP1B_8A3GKItJx2ihlLDlwbRJqcoShCZCBWaSvpehUbYHxDbIvrVrY0B00oTODgSeQQ/exec'; 

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
        .then(() => {
            alert("הזמנה התקבלה במטבח! תודה רבה.");
            location.reload();
        })
        .catch(() => {
            alert("אופס, היתה שגיאה. נסה שוב?");
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
